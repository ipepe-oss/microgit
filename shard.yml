name: microgit.cr
version: 0.1.0

authors:
  - Håkan Nylén <hakan@dun.se>

targets:
  microgit:
    main: src/microgit.cr

crystal: 1.11.2

dependencies:
  lucky:
    github: luckyframework/lucky
    version: ~> 1.3
  authentic:
    github: luckyframework/authentic
    version: ~> 1.0
  carbon:
    github: luckyframework/carbon
    version: ~> 0.6
  dotenv:
    github: gdotdesign/cr-dotenv
    version: 0.3.0
  lucky_flow:
    github: luckyframework/lucky_flow
    version: ~> 0.10
  jwt:
    github: crystal-community/jwt
    version: ~> 1.6
  avram:
    github: luckyframework/avram
    version: ~> 1.3
  git:
    github: microgit-com/libgit2.cr
  kilt:
    github: jeromegn/kilt
  markd:
    github: icyleaf/markd
  sluggr:
    github: microgit-com/sluggr
  lucky_encrypted:
    github: microgit-com/lucky_encrypted
    branch: master
  git_diff_parser:
    github: microgit-com/git_diff_parser
  linguist:
    github: microgit-com/linguist.cr
  redis:
    github: jgaskins/redis
    version: ~> 0.12
  lucky_can:
    github: confact/lucky_can
  mosquito:
    github: robacarp/mosquito
